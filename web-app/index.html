<!doctype html>
<html lang="en-gb">
<head>
    <meta charset="utf-8">
    <title>King's Crossing</title>
    <link rel="stylesheet" href="default.css">
    <script type="module" src="main.js"></script>
</head>

<body>
    <header>
        <h1 id="title">King's Crossing</h1>
        <a href="/docs/">API Documentation</a>
    </header>

    <main tabindex="-1" aria-label="King's Crossing game area">
        <div
            id="game_board"
            role="grid"
            aria-label="King's Crossing chess board"
        ></div>
    </main>

    <aside id="home_player" class="sidebar" aria-label="Player 1 information">
        <div class="player">
            <input
                id="home_name"
                aria-label="Player 1 name"
                value="Player 1"
            >
        </div>

        <div class="game_info">
            <h2 id="home_player_type">White Pieces</h2>
            <p id="home_ready" aria-live="polite">
                The king enters the crossing...
            </p>
        </div>
    </aside>

    <aside id="away_player" class="sidebar" aria-label="Player 2 information">
        <div class="player">
            <input
                id="away_name"
                aria-label="Player 2 name"
                value="Player 2"
            >
        </div>

        <div class="game_info">
            <h2 id="away_player_type">Black Pieces</h2>
            <p id="away_ready" aria-live="polite">Black is waiting.</p>
        </div>
    </aside>

    <dialog id="result_dialog" tabindex="0" aria-label="Game result message">
        <h2 id="result_winner" aria-live="assertive">Awaiting result</h2>
        <p id="result_message" aria-live="assertive">
            The crossing has ended.
        </p>
    </dialog>
</body>
</html>
